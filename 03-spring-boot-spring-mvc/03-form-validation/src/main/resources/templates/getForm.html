<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset = "UTF-8">
    <title>Customer Form</title>
    <style>
        .error {color:red}
    </style>
</head>

<body>
<i>Fill out the form.Asterisk (*) means required.</i>

<form th:action="@{/process-form}" th:object="${customer}" method="POST">

    First Name(*): <input type="text" th:field="*{fName}"/>

    <!--Add error message (if present)-->
    <span th:if="${#fields.hasErrors('fName')}"
          th:errors="*{fName}"
          class="error"></span>

    <br><br>

    Last Name: <input type="text" th:field="*{lName}"/>
    <br><br>

    Free Passes: <input type="number" th:field="*{passes}">

    <span th:if="${#fields.hasErrors('passes')}"
          th:errors="*{passes}"
          class="error"></span>
    <br><br>

    Postal Code: <input type="text" th:field="*{postalCode}">

    <span th:if="${#fields.hasErrors('postalCode')}"
          th:errors="*{postalCode}"
          class="error"></span>
    <br><br>


    <input type="submit">

</form>
</body>
</html>
